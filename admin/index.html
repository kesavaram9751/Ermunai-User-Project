<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Admin Portal Login | Ermunai Organic</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#0d631b",
            "success-leaf": "#43A047",
            "surface": "#fbf9f3",
            "on-surface": "#1b1c19",
            "on-surface-variant": "#40493d",
            "outline-variant": "#bfcaba",
            "glass-stroke": "rgba(46, 125, 50, 0.1)"
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface text-on-surface flex min-h-screen items-center justify-center p-4 selection:bg-primary/20 antialiased">
  
  <div class="w-full max-w-md p-8 bg-white/70 backdrop-blur-md rounded-2xl border border-glass-stroke shadow-xl space-y-6">
    <div class="text-center space-y-2">
      <div class="inline-flex w-12 h-12 bg-primary rounded-lg items-center justify-center">
        <span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">eco</span>
      </div>
      <h2 class="text-2xl font-extrabold text-primary">Admin Control Portal</h2>
      <p class="text-xs text-on-surface-variant">Sign in to manage products, categories, orders, settings, and campaigns.</p>
    </div>

    <form id="adminLoginForm" class="space-y-4">
      <div class="space-y-1">
        <label class="block text-xs font-bold text-primary uppercase tracking-widest" for="email">Admin Email</label>
        <input type="email" id="email" required class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm" placeholder="admin@ermunai.com"/>
      </div>
      <div class="space-y-1">
        <label class="block text-xs font-bold text-primary uppercase tracking-widest" for="password">Password</label>
        <input type="password" id="password" required class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm" placeholder="••••••••"/>
      </div>
      <button type="submit" id="submitBtn" class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:opacity-90 active:scale-95 transition-all text-sm shadow-md flex items-center justify-center gap-2">
        Enter Portal <span class="material-symbols-outlined text-sm">login</span>
      </button>
    </form>

    <div class="text-center text-xs">
      <p id="msg" class="font-bold text-error"></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "./supabase-compat.js";
    import { getAuth, signInWithEmailAndPassword, signOut } from "./supabase-compat.js";
    import { getSupabase, doc, getDoc, setDoc } from "./supabase-compat.js";
const app = initializeApp();
    const auth = getAuth(app);
    const db = getSupabase(app);

    const ADMIN_EMAIL = "ermunaiorganicfarm@gmail.com";
    const form = document.getElementById("adminLoginForm");
    const msg = document.getElementById("msg");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      submitBtn.disabled = true;
      submitBtn.textContent = "Verifying credentials...";

      const emailVal = document.getElementById("email").value.trim();
      const passwordVal = document.getElementById("password").value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, emailVal, passwordVal);
        const user = userCredential.user;

        const roleSnap = await getDoc(doc(db, "users", user.uid));
        const role = roleSnap.exists() ? roleSnap.data().role : null;
        const allowedRoles = ["Super Admin", "Admin", "Inventory Manager", "Support Staff", "Marketing Team"];
        const isLegacyAdmin = user.email === ADMIN_EMAIL;

        if (allowedRoles.includes(role) || isLegacyAdmin) {
          if (isLegacyAdmin && !roleSnap.exists()) {
            await setDoc(doc(db, "users", user.uid), {
              role: "Super Admin",
              email: user.email,
              displayName: "Super Admin",
              createdAt: new Date().toISOString()
            });
          }
          msg.textContent = "Authentication successful! Entering portal...";
          msg.className = "text-xs font-bold text-success-leaf";
          
          setTimeout(() => {
            window.location.href = "admin-dashboard.html";
          }, 1200);
        } else {
          msg.textContent = "Access denied: Unauthorized role credentials.";
          msg.className = "text-xs font-bold text-error";
          await signOut(auth);
          submitBtn.disabled = false;
          submitBtn.innerHTML = `Enter Portal <span class="material-symbols-outlined text-sm">login</span>`;
        }
      } catch (err) {
        msg.textContent = err.message.replace("Supabase: ", "");
        msg.className = "text-xs font-bold text-error";
        submitBtn.disabled = false;
        submitBtn.innerHTML = `Enter Portal <span class="material-symbols-outlined text-sm">login</span>`;
      }
    });
  </script>
</body>
</html>
