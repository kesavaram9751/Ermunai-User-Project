<html class="scroll-smooth" lang="en">
<head>

  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Checkout | Ermunai Organic Farm Foods</title>

<body class="bg-surface text-on-surface antialiased overflow-x-hidden">
  <div id="siteHeader"></div>

  <main id="checkoutPage" class="hidden pt-24 pb-stack-lg max-w-container-max mx-auto w-full px-margin-mobile md:px-margin-desktop">
    <!-- Header -->
    <header class="mb-10 text-left">
      <h1 class="text-3xl md:text-4xl font-extrabold text-primary mb-2">Secure Checkout</h1>
      <p class="text-on-surface-variant">Provide your shipping address and complete payment securely via Razorpay.</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter items-start">
      <!-- Steps Forms Left -->
      <section class="lg:col-span-8 space-y-6">
        
        <!-- Step 1: Address Details -->
        <div class="glass-card p-6 rounded-xl space-y-4">
          <h2 class="text-lg font-bold text-primary flex items-center gap-2 border-b border-glass-stroke pb-3">
            <span class="material-symbols-outlined">home</span> 1. Shipping Address Details
          </h2>
          <form id="checkoutForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="md:col-span-2 space-y-1">
              <label class="block text-xs font-bold text-primary uppercase tracking-widest" for="name">Full Name</label>
              <input id="name" name="name" class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm" required type="text" placeholder="John Doe"/>
            </div>
            <div class="space-y-1">
              <label class="block text-xs font-bold text-primary uppercase tracking-widest" for="phone">Phone Number</label>
              <input id="phone" name="phone" class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm" required type="tel" placeholder="e.g. +91 9876543210"/>
            </div>
            <div class="space-y-1">
              <label class="block text-xs font-bold text-primary uppercase tracking-widest" for="pin">PIN Code</label>
              <input id="pin" name="pin" class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm" required type="text" placeholder="600091"/>
            </div>
            <div class="md:col-span-2 space-y-1">
              <label class="block text-xs font-bold text-primary uppercase tracking-widest" for="address">Delivery Address</label>
              <textarea id="address" name="address" rows="3" class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm" required placeholder="Flat/House no., Building, Street name"></textarea>
            </div>
            <div class="space-y-1">
              <label class="block text-xs font-bold text-primary uppercase tracking-widest" for="city">City</label>
              <input id="city" name="city" class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm" required type="text" placeholder="Chennai"/>
            </div>
            <div class="space-y-1">
              <label class="block text-xs font-bold text-primary uppercase tracking-widest" for="state">State</label>
              <input id="state" name="state" class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm" required type="text" placeholder="Tamil Nadu"/>
            </div>
          </form>
        </div>

        <!-- Step 2: Delivery Option -->
        <div class="glass-card p-6 rounded-xl space-y-4">
          <h2 class="text-lg font-bold text-primary flex items-center gap-2 border-b border-glass-stroke pb-3">
            <span class="material-symbols-outlined">local_shipping</span> 2. Delivery Options
          </h2>
          <div class="space-y-1">
            <label class="block text-xs font-bold text-primary uppercase tracking-widest" for="deliveryOption">Select Speed</label>
            <select id="deliveryOption" class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm cursor-pointer">
              <option value="standard">Standard Delivery (3-5 Business Days)</option>
              <option value="express">Express Delivery (+₹50, Next Day Delivery)</option>
            </select>
          </div>
        </div>

      </section>

      <!-- Summary Right -->
      <aside class="lg:col-span-4 space-y-6">
        <div class="glass-card p-6 rounded-xl space-y-6">
          <h2 class="text-lg font-bold text-primary border-b border-glass-stroke pb-3 flex items-center gap-2">
            <span class="material-symbols-outlined">shopping_basket</span> Review Cart Items
          </h2>
          <div id="itemsList" class="space-y-3 divide-y divide-glass-stroke max-h-48 overflow-y-auto"></div>
          <div id="summaryRows" class="space-y-1 pt-4 border-t border-glass-stroke"></div>
          
          <button id="btnPay" class="w-full bg-primary text-white font-bold py-3.5 px-6 rounded-lg hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2 text-sm shadow-md">
            <span class="material-symbols-outlined">payments</span> Pay with Razorpay
          </button>
          <button id="invoicePreview" class="w-full py-2.5 border border-outline-variant text-on-surface-variant font-bold rounded-lg hover:bg-surface-container-high active:scale-95 transition-all text-xs flex items-center justify-center gap-1">
            <span class="material-symbols-outlined text-sm">download_for_offline</span> Generate Proforma Invoice
          </button>
        </div>
      </aside>
    </div>
  </main>

  <div id="siteFooter"></div>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script type="module">
    import { initializeApp } from "./js/supabase-compat.js";
    import { getSupabase, doc, getDoc, setDoc } from "./js/supabase-compat.js";
    import { getAuth, onAuthStateChanged, signOut } from "./js/supabase-compat.js";
    import { formatCurrency, getStorefrontCartKey, mountStorefrontHeader, readStorefrontCart, renderInto, summaryRow, mountStorefrontFooter, syncStorefrontAuth} from "./js/ermunai-components.js";
    mountStorefrontHeader("siteHeader", { active: "cart" });
    mountStorefrontFooter("siteFooter");

    const PRODUCTION_API_BASE_URL = "https://ermunai-user-project.onrender.com";
    const API_BASE_URLS = (location.hostname === "127.0.0.1" || location.hostname === "localhost")
      ? [PRODUCTION_API_BASE_URL, "http://localhost:5000"]
      : [PRODUCTION_API_BASE_URL];
const app = initializeApp();
    const db = getSupabase(app);
    const auth = getAuth(app);

    let currentUser = null;
    let cartKey = "";
    let cart = [];
    let subtotal = 0;
    let shipping = 0;
    let tax = 0;
    let discount = 0;
    let total = 0;
    let isProcessing = false;
    let razorpayKeyId = "";
    let activeApiBaseUrl = "";

    const form = document.getElementById("checkoutForm");
    const btnPay = document.getElementById("btnPay");
    const checkoutPage = document.getElementById("checkoutPage");

    async function apiFetch(path, options = {}) {
      const bases = activeApiBaseUrl
        ? [activeApiBaseUrl, ...API_BASE_URLS.filter(base => base !== activeApiBaseUrl)]
        : API_BASE_URLS;
      let lastError = null;

      for (const baseUrl of bases) {
        try {
          const response = await fetch(`${baseUrl}${path}`, options);
          activeApiBaseUrl = baseUrl;
          return response;
        } catch (error) {
          lastError = error;
          console.warn(`Checkout API unavailable at ${baseUrl}${path}:`, error);
        }
      }

      throw lastError || new Error("Checkout API is unavailable.");
    }

    function getWeightInGrams(item) {
      const value = Number(item.quantityValue || 0);
      const type = String(item.quantityType || "").toLowerCase();
      if (!value) return 250;
      if (type === "g" || type === "ml") return value;
      if (type === "kg" || type === "l" || type === "lt") return value * 1000;
      return 250;
    }

    function computeShipping(pin, items) {
      if (!pin || !items.length) return 0;
      const regionCharge = /^60/.test(pin) ? 50 : /^6|^5/.test(pin) ? 70 : 100;
      const totalWeight = items.reduce((sum, item) => sum + getWeightInGrams(item) * Number(item.qty || 1), 0);
      const weightExtra = totalWeight > 2000 ? 100 : totalWeight > 1000 ? 60 : totalWeight > 500 ? 30 : 0;
      const expressExtra = document.getElementById("deliveryOption").value === "express" ? 50 : 0;
      return regionCharge + weightExtra + expressExtra;
    }

    function updateTotals() {
      subtotal = cart.reduce((sum, item) => sum + Number(item.price || 0) * Number(item.qty || 1), 0);
      
      const savedCoupon = localStorage.getItem("checkout_coupon") || "";
      discount = savedCoupon === "FARM10" ? Math.min(35, subtotal) : 0;
      
      const pinVal = form.pin.value.trim();
      shipping = computeShipping(pinVal, cart);
      
      tax = Math.round(subtotal * 0.05);
      total = subtotal - discount + shipping + tax;

      // Render items list
      renderInto("itemsList", cart, item => `
        <div class="flex justify-between items-center text-xs py-1">
          <span class="text-on-surface-variant line-clamp-1 max-w-[180px]">${item.name} <span class="font-bold">x${item.qty}</span></span>
          <span class="font-extrabold text-earth-dark">${formatCurrency(Number(item.price || 0) * Number(item.qty || 1))}</span>
        </div>`);

      // Render summary
      renderInto("summaryRows", [
        { label: "Subtotal", value: formatCurrency(subtotal) },
        { label: "Discount Code", value: `- ${formatCurrency(discount)}` },
        { label: "Shipping & Handling", value: shipping ? formatCurrency(shipping) : "Enter PIN Code" },
        { label: "GST (5%)", value: formatCurrency(tax) },
        { label: "Grand Total", value: formatCurrency(total), total: true }
      ], summaryRow);
    }

    function buildOrder() {
      return {
        items: cart,
        subtotal,
        discount,
        tax,
        shipping,
        total,
        customer: {
          name: form.name.value.trim(),
          phone: form.phone.value.trim(),
          address: form.address.value.trim(),
          pin: form.pin.value.trim(),
          city: form.city.value.trim(),
          state: form.state.value.trim()
        },
        deliveryOption: document.getElementById("deliveryOption").value
      };
    }

    async function logFailedPayment(orderId, reason) {
      try {
        const idToken = await currentUser.getIdToken(true);
        await apiFetch("/payment-failed", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + idToken
          },
          body: JSON.stringify({ orderId, reason })
        });
      } catch (err) {
        console.warn("Unable to log failed payment:", err);
      }
    }

    async function loadPublicConfig() {
      try {
        const response = await apiFetch("/public-config");
        const config = await response.json();
        razorpayKeyId = config.razorpayKeyId || "";
      } catch (error) {
        console.warn("Unable to load public checkout config:", error);
      }
    }

    async function payNow() {
      if (isProcessing) return;
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }
      if (!cart.length) {
        alert("Your cart is empty.");
        return;
      }

      isProcessing = true;
      btnPay.disabled = true;
      btnPay.textContent = "Initiating payment gateway...";

      updateTotals();
      const order = buildOrder();
      let razorpayOrderId = "";

      try {
        const idToken = await currentUser.getIdToken(true);
        const createResp = await apiFetch("/create-order", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + idToken
          },
          body: JSON.stringify({ amount: order.total, cart: order.items })
        });

        const razorpayOrder = await createResp.json();
        if (!createResp.ok) throw new Error(razorpayOrder.error || "Unable to create Razorpay order");
        razorpayOrderId = razorpayOrder.id;
        if (!razorpayKeyId) await loadPublicConfig();
        if (!razorpayKeyId) throw new Error("Payment configuration is unavailable. Please try again later.");

        const options = {
          key: razorpayKeyId,
          amount: Math.round(order.total * 100),
          currency: "INR",
          name: "Ermunai Organic Farm Foods",
          description: "Organic Marketplace Order",
          order_id: razorpayOrderId,
          handler: async function (response) {
            btnPay.textContent = "Verifying signature and saving order...";
            try {
              const freshToken = await currentUser.getIdToken(true);
              
              // Address saving back to User profile doc in Supabase
              const userDocRef = doc(db, "users", currentUser.uid);
              await setDoc(userDocRef, {
                displayName: order.customer.name,
                phone: order.customer.phone,
                address: order.customer.address,
                city: order.customer.city,
                state: order.customer.state,
                pin: order.customer.pin,
                updatedAt: new Date().toISOString()
              }, { merge: true });

              const saveResp = await apiFetch("/save-order", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + freshToken
                },
                body: JSON.stringify({
                  orderData: {
                    ...order,
                    payment_id: response.razorpay_payment_id,
                    order_id: response.razorpay_order_id,
                    signature: response.razorpay_signature,
                    status: "Paid",
                    date: new Date().toISOString()
                  }
                })
              });
              
              const saveResult = await saveResp.json();
              if (!saveResp.ok) throw new Error(saveResult.error || "Verification success but save crashed");
              
              // Clear cart local storage
              localStorage.removeItem(cartKey);
              localStorage.removeItem("checkout_pin");
              localStorage.removeItem("checkout_coupon");
              
              window.location.href = `thankyou.html?order=${encodeURIComponent(saveResult.id || response.razorpay_order_id)}`;
            } catch (saveErr) {
              console.error("Order save crashed:", saveErr);
              alert("Signature verification success, but we failed to save the order details. Please contact customer support with payment reference ID: " + response.razorpay_payment_id);
              isProcessing = false;
              btnPay.disabled = false;
              btnPay.textContent = "Retry Order Save";
            }
          },
          prefill: {
            name: order.customer.name,
            contact: order.customer.phone,
            email: currentUser.email || ""
          },
          modal: {
            ondismiss() {
              isProcessing = false;
              btnPay.disabled = false;
              btnPay.textContent = "Pay with Razorpay";
              logFailedPayment(razorpayOrderId, "Payment popup closed by customer");
            }
          },
          theme: { color: "#0d631b" }
        };

        new Razorpay(options).open();
      } catch (error) {
        console.error("Payment initiation failed:", error);
        alert(error.message || "Failed to create order transaction. Please try again.");
        isProcessing = false;
        btnPay.disabled = false;
        btnPay.textContent = "Pay with Razorpay";
        if (razorpayOrderId) {
          logFailedPayment(razorpayOrderId, error.message || "Order creation failure");
        }
      }
    }

    function escapeInvoiceHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function generateInvoicePreview() {
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }
      updateTotals();
      const order = buildOrder();
      const invoiceDoc = document.implementation.createHTMLDocument("Proforma Invoice - Ermunai Organic");
      const style = invoiceDoc.createElement("style");
      style.textContent = [
        "body { font-family: 'Plus Jakarta Sans', Arial, sans-serif; color: #333; padding: 20px; line-height: 1.5; }",
        ".container { max-width: 800px; margin: auto; border: 1px solid #ddd; padding: 30px; border-radius: 12px; }",
        ".header { display: flex; justify-content: space-between; border-bottom: 2px solid #0d631b; padding-bottom: 20px; margin-bottom: 20px; }",
        ".brand { font-size: 24px; font-weight: bold; color: #0d631b; }",
        ".invoice-title { font-size: 20px; font-weight: bold; text-transform: uppercase; text-align: right; }",
        ".meta-details { display: flex; justify-content: space-between; margin-bottom: 30px; gap: 24px; }",
        "table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }",
        "th { background-color: #f5f3ee; color: #0d631b; padding: 10px; font-weight: bold; text-align: left; }",
        "td { padding: 10px; border-bottom: 1px solid #ddd; }",
        ".totals { float: right; width: 300px; margin-top: 20px; }",
        ".totals div { display: flex; justify-content: space-between; padding: 5px 0; }",
        ".grand-total { font-weight: bold; font-size: 18px; color: #0d631b; border-top: 1px solid #ddd; padding-top: 10px; }"
      ].join("\n");
      invoiceDoc.head.appendChild(style);

      const rows = order.items.map(item => [
        "<tr>",
        `<td>${escapeInvoiceHtml(item.name)}</td>`,
        `<td style="text-align: center;">${escapeInvoiceHtml(item.qty || 1)}</td>`,
        `<td style="text-align: right;">${escapeInvoiceHtml(formatCurrency(item.price))}</td>`,
        `<td style="text-align: right;">${escapeInvoiceHtml(formatCurrency(Number(item.price || 0) * Number(item.qty || 1)))}</td>`,
        "</tr>"
      ].join("")).join("");

      invoiceDoc.body.innerHTML = [
        '<div class="container">',
        '<div class="header">',
        '<div class="brand">Ermunai Organic Farm Foods</div>',
        '<div class="invoice-title">Proforma Invoice</div>',
        '</div>',
        '<div class="meta-details">',
        '<div>',
        '<strong>Billed To:</strong><br>',
        `${escapeInvoiceHtml(order.customer.name)}<br>`,
        `${escapeInvoiceHtml(order.customer.address)}, ${escapeInvoiceHtml(order.customer.city)}<br>`,
        `${escapeInvoiceHtml(order.customer.state)} - ${escapeInvoiceHtml(order.customer.pin)}<br>`,
        `Phone: ${escapeInvoiceHtml(order.customer.phone)}`,
        '</div>',
        '<div style="text-align: right;">',
        `<strong>Date Issued:</strong> ${escapeInvoiceHtml(new Date().toLocaleDateString())}<br>`,
        '<strong>Status:</strong> Draft / Unpaid',
        '</div>',
        '</div>',
        '<table>',
        '<thead><tr>',
        '<th>Product Description</th>',
        '<th style="text-align: center;">Qty</th>',
        '<th style="text-align: right;">Unit Price</th>',
        '<th style="text-align: right;">Amount</th>',
        '</tr></thead>',
        `<tbody>${rows}</tbody>`,
        '</table>',
        '<div class="totals">',
        `<div><span>Subtotal:</span><span>${escapeInvoiceHtml(formatCurrency(order.subtotal))}</span></div>`,
        `<div><span>Coupon Discount:</span><span>-${escapeInvoiceHtml(formatCurrency(order.discount))}</span></div>`,
        `<div><span>Shipping Charge:</span><span>${escapeInvoiceHtml(formatCurrency(order.shipping))}</span></div>`,
        `<div><span>GST (5%):</span><span>${escapeInvoiceHtml(formatCurrency(order.tax))}</span></div>`,
        `<div class="grand-total"><span>Grand Total:</span><span>${escapeInvoiceHtml(formatCurrency(order.total))}</span></div>`,
        '</div>',
        '<div style="clear: both; margin-top: 40px; font-size: 10px; color: #777;">',
        '* This is a computer-generated proforma invoice preview for your purchase check.',
        '</div>',
        '</div>'
      ].join("");

      const content = `<!doctype html>${invoiceDoc.documentElement.outerHTML}`;
      const blob = new Blob([content], { type: "text/html" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `Proforma_Invoice_${Date.now()}.html`;
      link.click();
    }

    // Set listeners
    btnPay.addEventListener("click", payNow);
    document.getElementById("invoicePreview").addEventListener("click", generateInvoicePreview);
    document.getElementById("deliveryOption").addEventListener("change", updateTotals);
    form.pin.addEventListener("input", updateTotals);

    // Monitor Auth state
    onAuthStateChanged(auth, async user => {
      syncStorefrontAuth(user);
      if (!user) {
        window.location.replace("login.html?redirect=cart.html");
        return;
      }
      currentUser = user;
      const name = user.displayName || (user.email ? user.email.split("@")[0] : "User");
      const userAvatar = document.getElementById("userAvatar");
      if (userAvatar) userAvatar.textContent = name.slice(0, 2).toUpperCase();
      
      cartKey = getStorefrontCartKey(currentUser);
      cart = readStorefrontCart(currentUser);
      const cartCount = document.getElementById("cartCount");
      if (cartCount) cartCount.textContent = cart.reduce((sum, item) => sum + Number(item.qty || 1), 0);
      
      if (!cart.length) {
        alert("Your cart is empty.");
        window.location.href = "shop.html";
        return;
      }

      // Pre-fill fields from localStorage first
      const checkoutPin = localStorage.getItem("checkout_pin") || "";
      if (checkoutPin) {
        form.pin.value = checkoutPin;
      }

      // Fetch user profile from Supabase to populate address form
      try {
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
          const udata = docSnap.data();
          if (udata.displayName) form.name.value = udata.displayName;
          if (udata.phone) form.phone.value = udata.phone;
          if (udata.address) form.address.value = udata.address;
          if (udata.city) form.city.value = udata.city;
          if (udata.state) form.state.value = udata.state;
          if (udata.pin) form.pin.value = udata.pin;
        }
      } catch (err) {
        console.warn("Unable to prefill user details:", err);
      }

      updateTotals();
      checkoutPage.classList.remove("hidden");
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.reload();
    });
  </script>
</body>
</html>
