<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Blogs & Farm Stories | Ermunai Organic</title>
  <meta content="Insights on organic farming, startup stories, and recipes from Ermunai Organic Farm Foods." name="description"/>
  <link rel="icon" href="./images/logo.jpg" sizes="32x32" type="image/png">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#0d631b",
            "success-leaf": "#43A047",
            "surface-container-low": "#f5f3ee",
            "surface": "#fbf9f3",
            "on-surface": "#1b1c19",
            "on-surface-variant": "#40493d",
            "outline-variant": "#bfcaba",
            "earth-dark": "#4E342E",
            "glass-stroke": "rgba(46, 125, 50, 0.1)"
          }
        }
      }
    }
  </script>
  <style>
    .glass-nav {
      background: rgba(251, 249, 243, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(46, 125, 50, 0.1);
    }
    .blog-hero {
      min-height: 560px;
      box-shadow: 0 40px 80px -20px rgba(46, 125, 50, 0.12);
    }
    .article-body p { margin: 0 0 1.5rem; }
    .article-body h2 { margin: 2.5rem 0 1rem; color: #0d631b; font-size: clamp(1.5rem, 3vw, 2rem); font-weight: 800; line-height: 1.2; }
    .article-body h3 { margin: 2rem 0 .8rem; color: #1b1c19; font-size: 1.35rem; font-weight: 800; }
    .article-body ul, .article-body ol { margin: 1rem 0 1.5rem 1.25rem; display: grid; gap: .65rem; }
    .article-body blockquote { border-left: 4px solid #0d631b; padding: .8rem 1rem; background: rgba(13,99,27,.06); border-radius: 0 .75rem .75rem 0; font-weight: 700; color: #1b1c19; }
    .article-body img { width: 100%; border-radius: .75rem; margin: 2rem 0; }
    .filter-btn.active { background: #0d631b; color: #fff; }
    @media (max-width: 720px) {
      .blog-hero { min-height: 480px; }
    }
  </style>
</head>
<body class="bg-surface text-on-surface antialiased overflow-x-hidden">
  <div id="siteHeader"></div>

  <main id="mainContent" class="pt-24 pb-16">
    <div id="blogView" class="space-y-12"></div>
  </main>

  <div id="siteFooter"></div>

  <script type="module">
    import { initializeApp } from "./js/supabase-compat.js";
    import { getSupabase, collection, getDocs, query, orderBy } from "./js/supabase-compat.js";
    import { getAuth, onAuthStateChanged, signOut } from "./js/supabase-compat.js";
    import { blogCard, escapeHtml, mountStorefrontHeader, normalizeBlog, readStorefrontCart, renderInto, mountStorefrontFooter, syncStorefrontAuth } from "./js/ermunai-components.js";

    mountStorefrontHeader("siteHeader", { active: "blog" });
    mountStorefrontFooter("siteFooter");

    const app = initializeApp();
    const db = getSupabase(app);
    const auth = getAuth(app);

    const blogView = document.getElementById("blogView");
    const categories = ["All Stories", "Farm Stories", "Healthy Living", "Recipe Insights", "Sustainability", "Events"];

    function selectedPostKey() {
      const queryKey = new URLSearchParams(window.location.search).get("post");
      if (queryKey) return queryKey;
      const pathKey = window.location.pathname.split("/").filter(Boolean).pop();
      if (pathKey && !pathKey.endsWith(".html") && pathKey !== "blog") return pathKey;
      return "";
    }

    function sanitizeArticleHtml(html) {
      const source = String(html || "");
      if (!source.trim()) return "";
      const template = document.createElement("template");
      template.innerHTML = source.includes("<") ? source : source.split(/\n{2,}/).map(part => `<p>${escapeHtml(part).replace(/\n/g, "<br>")}</p>`).join("");
      const allowed = new Set(["P", "H2", "H3", "UL", "OL", "LI", "STRONG", "EM", "B", "I", "A", "IMG", "FIGURE", "FIGCAPTION", "BLOCKQUOTE", "BR"]);
      template.content.querySelectorAll("*").forEach(node => {
        if (node.tagName === "DIV") {
          const paragraph = document.createElement("p");
          paragraph.replaceChildren(...node.childNodes);
          node.replaceWith(paragraph);
          node = paragraph;
        }
        if (!allowed.has(node.tagName)) {
          node.replaceWith(...node.childNodes);
          return;
        }
        [...node.attributes].forEach(attr => {
          const name = attr.name.toLowerCase();
          if (node.tagName === "A" && name === "href") {
            node.setAttribute("target", "_blank");
            node.setAttribute("rel", "noopener");
            return;
          }
          if (node.tagName === "IMG" && ["src", "alt"].includes(name)) return;
          node.removeAttribute(attr.name);
        });
      });
      return template.innerHTML;
    }

    function updateBlogMeta(blog) {
      const item = normalizeBlog(blog);
      const url = new URL(window.location.href);
      document.title = `${item.title} | Ermunai Organic Farm Foods`;
      document.querySelector('meta[name="description"]').content = blog.seoDescription || item.desc || "Read the latest Ermunai Organic Farm Foods story.";
      const upsert = (selector, attrs) => {
        let tag = document.querySelector(selector);
        if (!tag) {
          tag = document.createElement("meta");
          document.head.appendChild(tag);
        }
        Object.entries(attrs).forEach(([key, value]) => tag.setAttribute(key, value));
      };
      upsert('meta[property="og:title"]', { property: "og:title", content: item.title });
      upsert('meta[property="og:description"]', { property: "og:description", content: item.desc });
      upsert('meta[property="og:image"]', { property: "og:image", content: item.image });
      upsert('meta[property="og:url"]', { property: "og:url", content: url.href });
      upsert('meta[name="twitter:card"]', { name: "twitter:card", content: "summary_large_image" });
    }

    function renderBlogDetail(blog, related = []) {
      const item = normalizeBlog(blog);
      const body = sanitizeArticleHtml(blog.content || item.desc || "More details coming soon from Ermunai Organic Farm Foods.");
      updateBlogMeta(blog);
      blogView.innerHTML = `
        <section class="px-6 max-w-7xl mx-auto">
          <div class="relative blog-hero rounded-xl overflow-hidden">
            <img class="absolute inset-0 w-full h-full object-cover" src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)}">
            <div class="absolute inset-0 bg-gradient-to-t from-black/75 via-black/30 to-black/10"></div>
            <div class="relative min-h-[560px] flex items-end p-6 md:p-12">
              <div class="max-w-4xl text-white space-y-5">
                <a href="blog.html" class="inline-flex items-center gap-2 text-sm font-extrabold text-white/90 hover:text-white">
                  <span class="material-symbols-outlined text-lg">arrow_back</span> All Stories
                </a>
                <div class="flex flex-wrap items-center gap-3 text-xs font-extrabold uppercase tracking-wider">
                  <span class="px-3 py-1 bg-primary text-white rounded-full">${escapeHtml(item.category)}</span>
                  <span>${escapeHtml(item.readTime)}</span>
                  <span>•</span>
                  <span>${escapeHtml(item.date)}</span>
                </div>
                <h1 class="text-4xl md:text-6xl font-extrabold leading-tight">${escapeHtml(item.title)}</h1>
                <p class="text-lg md:text-xl text-white/85 leading-8 max-w-3xl">${escapeHtml(item.desc)}</p>
                <div class="flex items-center gap-3 pt-2">
                  <img class="w-12 h-12 rounded-full object-cover border-2 border-white/70" src="${escapeHtml(item.authorImage)}" alt="${escapeHtml(item.author)}">
                  <div>
                    <p class="font-extrabold">${escapeHtml(item.author)}</p>
                    <p class="text-sm text-white/75">${escapeHtml(item.authorRole)}</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
        <section class="px-6 max-w-5xl mx-auto">
          <article class="article-body text-on-surface-variant text-lg leading-8 py-12">${body}</article>
        </section>
        ${related.length ? `<section class="px-6 max-w-7xl mx-auto pt-4">
          <div class="flex items-end justify-between gap-4 mb-8">
            <div>
              <span class="text-xs font-extrabold text-primary uppercase tracking-widest">Keep Reading</span>
              <h2 class="text-3xl font-extrabold text-on-surface mt-2">Related Stories</h2>
            </div>
            <a href="blog.html" class="text-sm font-extrabold text-primary">View all</a>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-8">${related.slice(0, 3).map(blogCard).join("")}</div>
        </section>` : ""}`;
    }

    function renderBlogHub(list) {
      const featured = list.find(item => item.featured) || list[0];
      const regular = featured ? list.filter(item => item.id !== featured.id) : list;
      const categoryButtons = categories.map((category, index) => `
        <button class="filter-btn px-5 py-2 rounded-full ${index === 0 ? "active" : "bg-surface-container text-on-surface-variant"} font-bold text-sm transition-all active:scale-95" type="button" data-category="${escapeHtml(category)}">${escapeHtml(category)}</button>
      `).join("");
      blogView.innerHTML = `
        ${featured ? `<section class="px-6 max-w-7xl mx-auto">
          <a class="group block relative blog-hero rounded-xl overflow-hidden" href="${escapeHtml(normalizeBlog(featured).link)}">
            <img class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" src="${escapeHtml(normalizeBlog(featured).image)}" alt="${escapeHtml(normalizeBlog(featured).title)}">
            <div class="absolute inset-0 bg-gradient-to-t from-black/65 via-black/20 to-transparent"></div>
            <div class="relative min-h-[560px] flex items-end p-6 md:p-12">
              <div class="glass-card max-w-2xl rounded-xl p-6 md:p-8 shadow-xl">
                <div class="flex flex-wrap items-center gap-3 mb-4 text-xs font-extrabold">
                  <span class="px-3 py-1 bg-primary text-white rounded-full">Featured Story</span>
                  <span class="text-on-surface-variant">${escapeHtml(normalizeBlog(featured).readTime)}</span>
                </div>
                <h1 class="text-3xl md:text-5xl font-extrabold text-primary leading-tight mb-4">${escapeHtml(normalizeBlog(featured).title)}</h1>
                <p class="text-on-surface-variant leading-7 mb-6">${escapeHtml(normalizeBlog(featured).desc)}</p>
                <span class="inline-flex items-center gap-2 bg-primary text-white px-6 py-3 rounded-lg font-extrabold">Read Story <span class="material-symbols-outlined text-lg">arrow_forward</span></span>
              </div>
            </div>
          </a>
        </section>` : ""}
        <section class="px-6 max-w-7xl mx-auto">
          <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 pb-8 border-b border-outline-variant">
            <div class="flex flex-wrap gap-3" id="categoryFilters">${categoryButtons}</div>
            <div class="relative">
              <input id="blogSearch" class="pl-10 pr-4 py-3 bg-surface-container border-none rounded-lg focus:ring-2 focus:ring-primary/20 w-full md:w-72 transition-all" placeholder="Search articles..." type="search">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
            </div>
          </div>
        </section>
        <section class="px-6 max-w-7xl mx-auto">
          <div id="blogsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">${regular.map(blogCard).join("")}</div>
        </section>`;

      const grid = document.getElementById("blogsGrid");
      const search = document.getElementById("blogSearch");
      const filters = [...document.querySelectorAll(".filter-btn")];
      const applyFilters = () => {
        const active = document.querySelector(".filter-btn.active")?.dataset.category || "All Stories";
        const term = search.value.trim().toLowerCase();
        const filtered = regular.filter(blog => {
          const item = normalizeBlog(blog);
          const inCategory = active === "All Stories" || item.category === active;
          const text = `${item.title} ${item.desc} ${item.category} ${item.author}`.toLowerCase();
          return inCategory && (!term || text.includes(term));
        });
        renderInto(grid, filtered, blogCard);
        if (!filtered.length) grid.innerHTML = `<div class="lg:col-span-3 md:col-span-2 glass-card rounded-xl p-8 text-center"><h2 class="text-2xl font-extrabold text-primary">No matching stories</h2><p class="text-sm text-on-surface-variant mt-3">Try another category or search term.</p></div>`;
      };
      filters.forEach(button => button.addEventListener("click", () => {
        filters.forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        applyFilters();
      }));
      search.addEventListener("input", applyFilters);
    }

    async function loadBlogs() {
      let list = [];

      try {
        const snap = await getDocs(query(collection(db, "blogs"), orderBy("updatedAt", "desc")));
        list = snap.docs
          .map(item => ({ id: item.id, ...item.data() }))
          .filter(blog => (blog.status || "published") === "published");
      } catch (err) {
        console.warn("Unable to fetch Supabase blogs:", err);
      }

      const selectedPost = selectedPostKey();
      if (selectedPost) {
        const match = list.find(blog => blog.slug === selectedPost || blog.id === selectedPost);
        if (match) {
          renderBlogDetail(match, list.filter(blog => blog.id !== match.id));
          return;
        }
        blogView.innerHTML = `<div class="max-w-3xl mx-auto px-6"><div class="glass-card rounded-xl p-8 text-center border border-glass-stroke bg-white/80">
          <h2 class="text-2xl font-extrabold text-primary">Blog post unavailable</h2>
          <p class="text-sm text-on-surface-variant mt-3">This post is not published or was removed from the admin panel.</p>
          <a href="blog.html" class="inline-flex mt-5 text-primary font-bold text-sm">Back to Blogs</a>
        </div></div>`;
        return;
      }

      if (!list.length) {
        blogView.innerHTML = `<div class="max-w-3xl mx-auto px-6"><div class="glass-card rounded-xl p-8 text-center border border-glass-stroke bg-white/80">
          <h2 class="text-2xl font-extrabold text-primary">No blogs published yet</h2>
          <p class="text-sm text-on-surface-variant mt-3">Publish a blog from Admin Site Control to show it here.</p>
        </div></div>`;
        return;
      }

      renderBlogHub(list);
    }

    function updateCartCount(user) {
      const cart = readStorefrontCart(user);
      document.getElementById("cartCount").textContent = cart.reduce((sum, item) => sum + Number(item.qty || 1), 0);
    }

    onAuthStateChanged(auth, user => {
      syncStorefrontAuth(user);
      updateCartCount(user);
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.reload();
    });

    loadBlogs();
  </script>
</body>
</html>
