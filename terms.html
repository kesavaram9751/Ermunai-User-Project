  <style data-policy-layout>
    body {
      background: #fbf9f3 !important;
      color: #1b1c19 !important;
      font-family: "Plus Jakarta Sans", Arial, sans-serif !important;
      padding-top: 96px;
    }

    body > .container {
      width: min(100% - 40px, 1000px);
      margin: 48px auto 64px !important;
      background: #fffdf7 !important;
      border: 1px solid rgba(46, 125, 50, 0.12);
      border-radius: 16px !important;
      box-shadow: 0 20px 55px rgba(27, 28, 25, 0.08) !important;
      padding: clamp(28px, 5vw, 56px) !important;
    }

    body > .container h1,
    body > .container h2,
    body > .container h3 {
      color: #0d631b !important;
      letter-spacing: 0 !important;
    }

    body > .container h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.05;
      margin-bottom: 12px;
    }

    body > .container h2 {
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      border-bottom-color: rgba(46, 125, 50, 0.14) !important;
    }

    body > .container p,
    body > .container li {
      color: #40493d !important;
      font-size: 1rem;
    }

    body > .container a {
      color: #0d631b !important;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      body { padding-top: 82px; }
      body > .container { width: min(100% - 28px, 1000px); margin-top: 28px !important; }
    }
