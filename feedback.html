<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Certifications & Feedback | Ermunai Organic</title>
  <meta content="View organic certifications, customer testimonials, and leave reviews for Ermunai Organic Farm Foods." name="description"/>
  <link rel="icon" href="./images/logo.jpg" sizes="32x32" type="image/png">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#0d631b",
            "success-leaf": "#43A047",
            "surface-container-low": "#f5f3ee",
            "surface": "#fbf9f3",
            "on-surface": "#1b1c19",
            "on-surface-variant": "#40493d",
            "outline-variant": "#bfcaba",
            "earth-dark": "#4E342E",
            "glass-stroke": "rgba(46, 125, 50, 0.1)"
          }
        }
      }
    }
  </script>
  <style>
    .glass-nav {
      background: rgba(251, 249, 243, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(46, 125, 50, 0.1);
    }
  </style>
</head>
<body class="bg-surface text-on-surface antialiased overflow-x-hidden">
  <div id="siteHeader"></div>

  <main class="pt-24 max-w-7xl mx-auto px-6 space-y-16 pb-16">
    <!-- Header -->
    <header class="text-center max-w-2xl mx-auto space-y-4">
      <span class="inline-block px-3 py-1 bg-primary/10 text-primary rounded-lg font-bold text-xs uppercase tracking-wider">Trust & Verification</span>
      <h1 class="text-4xl font-extrabold text-primary">Certifications & Feedback</h1>
      <p class="text-sm text-on-surface-variant leading-relaxed">We maintain high agricultural and processing benchmarks to deliver authentic native nutrition safely.</p>
    </header>

    <!-- Badges -->
    <section class="space-y-6">
      <h2 class="text-2xl font-bold text-primary text-center">Quality & Trust Badges</h2>
      <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-4">
        <div class="glass-card p-4 rounded-xl flex items-center justify-center bg-white"><img class="max-h-16 object-contain" src="./images/certificates/c1.jpg" alt="Badge 1"/></div>
        <div class="glass-card p-4 rounded-xl flex items-center justify-center bg-white"><img class="max-h-16 object-contain" src="./images/certificates/c2.jpg" alt="Badge 2"/></div>
        <div class="glass-card p-4 rounded-xl flex items-center justify-center bg-white"><img class="max-h-16 object-contain" src="./images/certificates/c3.jpg" alt="Badge 3"/></div>
        <div class="glass-card p-4 rounded-xl flex items-center justify-center bg-white"><img class="max-h-16 object-contain" src="./images/certificates/c4.jpg" alt="Badge 4"/></div>
        <div class="glass-card p-4 rounded-xl flex items-center justify-center bg-white"><img class="max-h-16 object-contain" src="./images/certificates/c5.jpg" alt="Badge 5"/></div>
        <div class="glass-card p-4 rounded-xl flex items-center justify-center bg-white"><img class="max-h-16 object-contain" src="./images/certificates/c6.jpg" alt="Badge 6"/></div>
        <div class="glass-card p-4 rounded-xl flex items-center justify-center bg-white"><img class="max-h-16 object-contain" src="./images/certificates/c7.jpg" alt="Badge 7"/></div>
        <div class="glass-card p-4 rounded-xl flex items-center justify-center bg-white"><img class="max-h-16 object-contain" src="./images/certificates/c8.jpg" alt="Badge 8"/></div>
      </div>
    </section>

    <!-- Testimonials Screenshots -->
    <section class="space-y-6">
      <h2 class="text-2xl font-bold text-primary text-center">Customer Testimonials</h2>
      <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-4">
        <div class="rounded-xl overflow-hidden shadow-sm border border-glass-stroke bg-white"><img class="w-full h-full object-cover" src="./images/feedbacks/fb1.jpg" alt="Feedback 1"/></div>
        <div class="rounded-xl overflow-hidden shadow-sm border border-glass-stroke bg-white"><img class="w-full h-full object-cover" src="./images/feedbacks/fb2.jpg" alt="Feedback 2"/></div>
        <div class="rounded-xl overflow-hidden shadow-sm border border-glass-stroke bg-white"><img class="w-full h-full object-cover" src="./images/feedbacks/fb3.jpg" alt="Feedback 3"/></div>
        <div class="rounded-xl overflow-hidden shadow-sm border border-glass-stroke bg-white"><img class="w-full h-full object-cover" src="./images/feedbacks/fb4.jpg" alt="Feedback 4"/></div>
        <div class="rounded-xl overflow-hidden shadow-sm border border-glass-stroke bg-white"><img class="w-full h-full object-cover" src="./images/feedbacks/fb5.jpg" alt="Feedback 5"/></div>
        <div class="rounded-xl overflow-hidden shadow-sm border border-glass-stroke bg-white"><img class="w-full h-full object-cover" src="./images/feedbacks/fb6.jpg" alt="Feedback 6"/></div>
      </div>
    </section>

    <!-- Dynamic Reviews & Submission Form -->
    <section class="grid grid-cols-1 lg:grid-cols-12 gap-8 pt-6">
      <!-- Read Reviews Left -->
      <div class="lg:col-span-7 space-y-6">
        <h2 class="text-2xl font-bold text-primary">Recent User Ratings</h2>
        <div id="reviewsList" class="space-y-4 divide-y divide-glass-stroke"></div>
      </div>

      <!-- Write Review Right -->
      <div class="lg:col-span-5 glass-card p-6 rounded-2xl space-y-4 h-fit">
        <h2 class="text-lg font-bold text-primary border-b border-glass-stroke pb-3 flex items-center gap-1">
          <span class="material-symbols-outlined">rate_review</span> Leave a Review
        </h2>
        <form id="reviewForm" class="space-y-4">
          <div class="space-y-1">
            <label class="block text-xs font-bold text-primary uppercase tracking-widest">Your Name</label>
            <input id="revName" required class="w-full px-4 py-2 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 text-sm" placeholder="e.g. Anand Kumar"/>
          </div>
          <div class="space-y-1">
            <label class="block text-xs font-bold text-primary uppercase tracking-widest">Rating</label>
            <select id="revRating" class="w-full px-4 py-2 border border-outline-variant rounded-lg text-sm cursor-pointer">
              <option value="5">5 Stars (Excellent)</option>
              <option value="4">4 Stars (Good)</option>
              <option value="3">3 Stars (Average)</option>
              <option value="2">2 Stars (Poor)</option>
              <option value="1">1 Star (Very Bad)</option>
            </select>
          </div>
          <div class="space-y-1">
            <label class="block text-xs font-bold text-primary uppercase tracking-widest">Review Comments</label>
            <textarea id="revText" required rows="4" class="w-full px-4 py-2 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 text-sm" placeholder="How did you like our millet mixes or podi?"></textarea>
          </div>
          <button type="submit" id="submitRevBtn" class="w-full bg-primary text-white font-bold py-2.5 rounded-lg hover:opacity-90 active:scale-95 transition-all text-xs flex items-center justify-center gap-1">
            Submit Rating
          </button>
        </form>
        <p id="revStatusMsg" class="text-xs font-bold text-center hidden"></p>
      </div>
    </section>
  </main>

  <div id="siteFooter"></div>

  <script type="module">
    import { initializeApp } from "./js/supabase-compat.js";
    import { getSupabase, collection, addDoc, getDocs, query, limit } from "./js/supabase-compat.js";
    import { getAuth, onAuthStateChanged, signOut } from "./js/supabase-compat.js";
    import { mountStorefrontHeader, mountStorefrontFooter, readStorefrontCart} from "./js/ermunai-components.js";
    mountStorefrontHeader("siteHeader", { active: "feedback" });
    mountStorefrontFooter("siteFooter");
const app = initializeApp();
    const db = getSupabase(app);
    const auth = getAuth(app);

    let currentUser = null;

    const fallbackReviews = [
      { name: "Meera Krishnan", rating: 5, text: "The Red Sorghum Rava Dosa is absolutely delicious! My kids loved it and it's so healthy.", date: "12/05/2026" },
      { name: "Suresh Kumar", rating: 4, text: "Excellent garlic paruppu podi. Authentic taste, goes great with idlis and hot ghee.", date: "05/05/2026" },
      { name: "Devi Prasad", rating: 5, text: "Quick shipping within Chennai and premium packaging. Will order Pongal mix next time.", date: "28/04/2026" }
    ];

    async function loadReviews() {
      const list = document.getElementById("reviewsList");
      list.innerHTML = "<p class='text-xs text-on-surface-variant'>Loading reviews...</p>";
      
      try {
        const snap = await getDocs(collection(db, "reviews"));
        const reviews = snap.docs.map(doc => ({
          name: doc.data().name,
          rating: doc.data().rating,
          text: doc.data().text,
          date: doc.data().createdAt ? new Date(doc.data().createdAt).toLocaleDateString() : "Recently"
        }));
        
        const finalReviews = reviews.length ? reviews : fallbackReviews;
        list.innerHTML = finalReviews.map(r => `
          <div class="py-4 space-y-2">
            <div class="flex justify-between items-center text-xs">
              <span class="font-bold text-on-surface text-sm">${escapeHtml(r.name)}</span>
              <span class="text-outline font-semibold">${r.date}</span>
            </div>
            <div class="text-[#a66d12] text-xs font-bold">
              ${'★'.repeat(Number(r.rating || 5))}${'☆'.repeat(5 - Number(r.rating || 5))}
            </div>
            <p class="text-xs text-on-surface-variant leading-relaxed">${escapeHtml(r.text)}</p>
          </div>
        `).join("");
      } catch (err) {
        console.warn("Reviews load error:", err);
        list.innerHTML = fallbackReviews.map(r => `
          <div class="py-4 space-y-2">
            <div class="flex justify-between items-center text-xs">
              <span class="font-bold text-on-surface text-sm">${escapeHtml(r.name)}</span>
              <span class="text-outline font-semibold">${r.date}</span>
            </div>
            <div class="text-[#a66d12] text-xs font-bold">
              ${'★'.repeat(Number(r.rating))}${'☆'.repeat(5 - Number(r.rating))}
            </div>
            <p class="text-xs text-on-surface-variant leading-relaxed">${escapeHtml(r.text)}</p>
          </div>
        `).join("");
      }
    }

    // Submit review form
    const reviewForm = document.getElementById("reviewForm");
    const revStatusMsg = document.getElementById("revStatusMsg");

    reviewForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentUser) {
        alert("Please login to leave a rating review.");
        window.location.href = "login.html";
        return;
      }
      
      const name = document.getElementById("revName").value.trim();
      const rating = document.getElementById("revRating").value;
      const text = document.getElementById("revText").value.trim();

      try {
        await addDoc(collection(db, "reviews"), {
          name,
          rating: Number(rating),
          text,
          userId: currentUser.uid,
          createdAt: new Date().toISOString()
        });

        revStatusMsg.textContent = "Thank you for your valuable feedback!";
        revStatusMsg.className = "text-xs font-bold text-success-leaf text-center block";
        revStatusMsg.classList.remove("hidden");
        reviewForm.reset();
        loadReviews();
      } catch (err) {
        console.error(err);
        revStatusMsg.textContent = "Unable to post review at the moment.";
        revStatusMsg.className = "text-xs font-bold text-error text-center block";
        revStatusMsg.classList.remove("hidden");
      }
    });

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function updateCartCount(user) {
      const cart = readStorefrontCart(user);
      document.getElementById("cartCount").textContent = cart.reduce((sum, item) => sum + Number(item.qty || 1), 0);
    }

    onAuthStateChanged(auth, user => {
      const authLinks = document.getElementById("authLinks");
      const userProfile = document.getElementById("userProfile");
      const dashboardLink = document.getElementById("dashboardLink");
      
      if (user) {
        currentUser = user;
        authLinks.classList.add("hidden");
        userProfile.classList.remove("hidden");
        userProfile.classList.add("flex");
        dashboardLink.classList.remove("hidden");
        const name = user.displayName || (user.email ? user.email.split("@")[0] : "User");
        document.getElementById("userAvatar").textContent = name.slice(0, 2).toUpperCase();
        document.getElementById("revName").value = name;
      } else {
        currentUser = null;
        authLinks.classList.remove("hidden");
        userProfile.classList.add("hidden");
        userProfile.classList.remove("flex");
        dashboardLink.classList.add("hidden");
      }
      updateCartCount(user);
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.reload();
    });

    loadReviews();
  </script>
</body>
</html>
