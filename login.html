<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Customer Login | Ermunai Organic</title>
  <meta content="Sign in to your Ermunai Organic marketplace account to track orders and manage your cart." name="description"/>
  <link rel="icon" href="./images/logo.jpg" sizes="32x32" type="image/png">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#0d631b",
            "success-leaf": "#43A047",
            "surface": "#fbf9f3",
            "on-surface": "#1b1c19",
            "on-surface-variant": "#40493d",
            "outline-variant": "#bfcaba",
            "earth-dark": "#4E342E",
            "glass-stroke": "rgba(46, 125, 50, 0.1)"
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface text-on-surface flex min-h-screen items-center justify-center p-4 selection:bg-primary/20 antialiased">
  
  <div class="w-full max-w-md p-8 bg-white/70 backdrop-blur-md rounded-2xl border border-glass-stroke shadow-xl space-y-6">
    <div class="text-center space-y-2">
      <a href="index.html" class="inline-flex items-center gap-2">
        <img class="w-12 h-12 rounded-full border border-glass-stroke" src="./images/logo.jpg" alt="Logo"/>
      </a>
      <h2 class="text-2xl font-extrabold text-primary">Welcome Back</h2>
      <p class="text-xs text-on-surface-variant">Sign in to experience pure, sustainable farm-direct products.</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div class="space-y-1">
        <label class="block text-xs font-bold text-primary uppercase tracking-widest" for="email">Email Address</label>
        <input type="email" id="email" required class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm" placeholder="you@example.com"/>
      </div>
      <div class="space-y-1">
        <label class="block text-xs font-bold text-primary uppercase tracking-widest" for="password">Password</label>
        <input type="password" id="password" required class="w-full px-4 py-2.5 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-sm" placeholder="••••••••"/>
      </div>
      <button type="submit" id="submitBtn" class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:opacity-90 active:scale-95 transition-all text-sm shadow-md flex items-center justify-center gap-2">
        Sign In <span class="material-symbols-outlined text-sm">arrow_forward</span>
      </button>
    </form>

    <div class="text-center text-xs space-y-2">
      <p class="text-on-surface-variant font-medium">Don't have an account? <a class="text-primary font-bold hover:underline" href="signup.html">Create Account</a></p>
      <p id="msg" class="font-bold text-error"></p>
    </div>
  </div>

  <div id="siteFooter"></div>

  <script type="module">
    import { initializeApp } from "./js/supabase-compat.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "./js/supabase-compat.js";
const app = initializeApp();
    const auth = getAuth(app);

    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');
    const submitBtn = document.getElementById('submitBtn');

    const params = new URLSearchParams(window.location.search);
    const redirectTo = params.get("redirect") || "index.html";

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = redirectTo;
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = "Signing you in...";
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        localStorage.setItem("user", userCredential.user.email);
        window.location.href = redirectTo;
      } catch (err) {
        msg.textContent = err.message.replace("Supabase: ", "");
        submitBtn.disabled = false;
        submitBtn.innerHTML = `Sign In <span class="material-symbols-outlined text-sm">arrow_forward</span>`;
      }
    });
  </script>
  <script type="module">
    import { mountStorefrontFooter } from "./js/ermunai-components.js";
    mountStorefrontFooter("siteFooter");
  </script>
</body>
</html>
